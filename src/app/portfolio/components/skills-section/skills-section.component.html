<section id="skills" class="section-card info-section" aria-labelledby="skills-title">
    <div class="section-heading">
        <span class="section-icon" aria-hidden="true">⌁</span>
        <h2 id="skills-title">Ключевые навыки</h2>
    </div>
    <ul class="chip-list" aria-label="Навыки">
        @for (skill of skills; track skill) {
            <li>{{ skill }}</li>
        }
    </ul>
</section>
